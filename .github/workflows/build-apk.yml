name: Compilar APK Android

# Se ejecuta automáticamente cada vez que subís cambios a la rama principal,
# o manualmente desde la pestaña "Actions" de GitHub con el botón "Run workflow".
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configurar Java (necesario para compilar Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Instalar dependencias del proyecto
        run: npm install

      - name: Compilar el frontend web y sincronizar con Android
        run: npm run build:mobile

      - name: Dar permisos de ejecución a Gradle
        run: chmod +x android/gradlew

      - name: Compilar el APK (versión de depuración, instalable directamente)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Subir el APK como resultado descargable
        uses: actions/upload-artifact@v4
        with:
          name: AsistentePsicopedagogico-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
